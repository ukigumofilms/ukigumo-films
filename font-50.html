<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Selection — 50 Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Spectral:ital,wght@0,200;1,200&family=Crimson+Pro:ital,wght@0,200;0,300;1,200;1,300&family=Lora:ital,wght@0,400;1,400&family=Cardo:ital@0;1&family=Sorts+Mill+Goudy:ital@0;1&family=Bodoni+Moda:ital,wght@0,400;1,400&family=DM+Serif+Display:ital@0;1&family=Noto+Serif+Display:ital,wght@0,300;1,300&family=Cormorant:ital,wght@0,300;1,300&family=Cormorant+Infant:ital,wght@0,300;1,300&family=Cormorant+Upright:wght@300;400&family=Gilda+Display&family=Forum&family=Antic+Didone&family=Cinzel:wght@400;500&family=Marcellus&display=swap" rel="stylesheet">

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased;}
  .header{text-align:center;padding:1.8rem 1rem 0.3rem;}
  .header h1{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;letter-spacing:0.15em;}
  .header p{font-size:0.5rem;opacity:0.25;margin-top:0.25rem;font-family:'Cormorant Garamond',serif;}
  .cat-nav{display:flex;justify-content:center;gap:0.5rem;padding:0.8rem 1rem;flex-wrap:wrap;}
  .cat-btn{font-family:'Cormorant Garamond',serif;font-size:0.55rem;letter-spacing:0.1em;padding:0.3rem 0.8rem;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(255,255,255,0.35);cursor:pointer;border-radius:1px;transition:all 0.3s;}
  .cat-btn:hover,.cat-btn.active{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.3);}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(min(100%,480px),1fr));
    gap:0.8rem;padding:0.5rem 1rem 3rem;
    max-width:1100px;margin:0 auto;
  }
  .card{position:relative;overflow:hidden;aspect-ratio:16/9;border-radius:2px;transition:transform 0.3s;display:block;}
  .card.hidden{display:none;}
  .card:hover{transform:scale(1.01);}
  .card__bg{position:absolute;top:0;left:0;width:100%;height:100%;}
  .card__bg img{width:100%;height:100%;object-fit:cover;}
  .card__overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.73);}
  .card__num{position:absolute;top:0.45rem;left:0.55rem;font-family:'Cormorant Garamond',serif;font-size:0.48rem;letter-spacing:0.1em;opacity:0.25;}
  .card__info{position:absolute;bottom:0.3rem;right:0.55rem;font-size:0.4rem;opacity:0.2;font-family:'Cormorant Garamond',serif;}
  .card__tag{position:absolute;top:0.45rem;right:0.55rem;font-size:0.36rem;opacity:0.22;font-family:'Cormorant Garamond',serif;letter-spacing:0.05em;background:rgba(255,255,255,0.06);padding:0.12rem 0.35rem;border-radius:1px;}
  .card__text{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;padding:1rem 1.5rem;text-align:center;
  }
  .card__main{line-height:1.8;color:rgba(255,255,255,0.58);}
  .card__sub{line-height:1.8;color:rgba(255,255,255,0.3);margin-top:clamp(0.8rem,2.5vw,1.5rem);}
  @media(max-width:480px){
    .grid{grid-template-columns:1fr;padding:0.4rem;gap:0.6rem;}
    .card{aspect-ratio:9/14;}
  }
  .footer{text-align:center;padding:1.5rem;font-size:0.42rem;opacity:0.12;font-family:'Cormorant Garamond',serif;}
</style>
</head>

  <p>筆記体・セリフ・サンセリフ・ディスプレイ 50フォント比較</p>
</div>
<div class="cat-nav">
  <button class="cat-btn active" data-cat="all">ALL</button>

  <button class="cat-btn" data-cat="display">Display / ディスプレイ</button>
</div>
<div class="grid" id="grid"></div>
<div class="footer">ukigumo — font selection preview</div>

  {n:'Cormorant Upright',   cat:'serif', ms:'clamp(1.2rem,3vw,1.6rem)',   ss:'clamp(0.95rem,2.4vw,1.25rem)',ls:'0.08em', w:300, l:'Cormorant Upright Light', tag:'直立セリフ'},

  {n:'Josefin Sans',        cat:'sans', ms:'clamp(1rem,2.5vw,1.35rem)',   ss:'clamp(0.85rem,2vw,1.1rem)',  ls:'0.15em', w:200, fi:'italic', l:'Josefin Sans ExtraLight Italic', tag:'ミニマルイタリック'},
  {n:'Poiret One',          cat:'sans', ms:'clamp(1rem,2.5vw,1.35rem)',   ss:'clamp(0.85rem,2vw,1.1rem)',  ls:'0.12em', tag:'アールデコ'},

const g=document.getElementById('grid');
F.forEach((f,i)=>{
  const img=imgs[i%imgs.length];
  const fw=f.w||400;
  const fi=f.fi||'normal';
  const lb=f.l||f.n;
  const fb=f.cat==='sans'?'sans-serif':f.cat==='script'?'cursive':'serif';
  const c=document.createElement('div');
  c.className='card';
  c.dataset.cat=f.cat;
  c.innerHTML=`
    <div class="card__bg"><img src="${img}" loading="lazy" alt=""><div class="card__overlay"></div></div>
    <div class="card__num">#${String(i+1).padStart(2,'0')}</div>
    <div class="card__tag">${f.tag}</div>
    <div class="card__info">${lb}</div>
    <div class="card__text">
      <p class="card__main" style="font-family:'${f.n}',${fb};font-size:${f.ms};font-weight:${fw};font-style:${fi};letter-spacing:${f.ls};">${m.join('<br>')}</p>
      <p class="card__sub" style="font-family:'${f.n}',${fb};font-size:${f.ss};font-weight:${fw};font-style:${fi};letter-spacing:${f.ls};">${s.join('<br>')}</p>
    </div>`;
  g.appendChild(c);
});

// Category filter
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cat=btn.dataset.cat;
    document.querySelectorAll('.card').forEach(c=>{
      c.classList.toggle('hidden', cat!=='all' && c.dataset.cat!==cat);
    });
  });
});
</script>
</body>
</html>
