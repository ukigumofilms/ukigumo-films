<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Animation Candidates</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400&family=Noto+Sans:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #F8F5EE;
    --text: #4A4A3A;
    --text-light: #8A8A7A;
    --accent: #6B7C5E;
    --font-serif: 'Cormorant Garamond', serif;
    --font-jp: 'Noto Sans JP', sans-serif;
    --font-sans: 'Noto Sans', sans-serif;
  }
  body { background:#1a1a1a; color:#fff; font-family:var(--font-sans); }

  .header { text-align:center; padding:2rem 1rem 1rem; font-family:var(--font-serif); }
  .header h1 { font-size:1.5rem; font-weight:300; letter-spacing:0.15em; }
  .header p { font-size:0.75rem; opacity:0.5; letter-spacing:0.1em; margin-top:0.3rem; }

  .tabs { display:flex; flex-wrap:wrap; justify-content:center; gap:0.5rem; padding:1rem; max-width:900px; margin:0 auto; }
  .tab { padding:0.5rem 1.2rem; border:1px solid rgba(255,255,255,0.2); background:transparent; color:#fff; font-size:0.8rem; cursor:pointer; letter-spacing:0.05em; transition:all 0.3s; }
  .tab:hover { border-color:rgba(255,255,255,0.5); }
  .tab.active { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.6); }

  .stage {
    width:100%; max-width:700px; margin:2rem auto; background:var(--bg);
    padding:5rem 2rem; text-align:center; min-height:400px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }

  .stage .label { font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--accent); margin-bottom:1.5rem; }
  .stage .heading { font-family:var(--font-serif); font-size:clamp(1.6rem,4vw,2.5rem); font-weight:300; line-height:1.6; color:var(--text); }
  .stage .heading .line { display:block; }
  .stage .desc { font-family:var(--font-jp); font-size:0.9rem; line-height:2; color:var(--text-light); margin-top:2rem; }
  .stage .desc .line { display:block; }
  .stage .cta { display:inline-block; margin-top:2.5rem; padding:0.8rem 2.5rem; border:1px solid var(--text-light); color:var(--text); font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; text-decoration:none; }

  /* All elements start hidden */
  .stage .anim-el { opacity:0; }

  .desc-block { text-align:center; padding:1.2rem 1rem; max-width:700px; margin:0 auto; }
  .desc-block h3 { font-size:0.95rem; font-weight:400; letter-spacing:0.08em; margin-bottom:0.4rem; }
  .desc-block p { font-size:0.75rem; opacity:0.5; line-height:1.6; }
  .footer { text-align:center; padding:2rem; font-size:0.65rem; opacity:0.3; }
</style>
</head>
<body>

<div class="header">
  <h1>About Animation Candidates</h1>
  <p>テキストアニメーション 10種</p>
</div>

<div class="tabs" id="tabs"></div>

<div class="stage" id="stage">
  <p class="label anim-el" id="el-label">About</p>
  <h2 class="heading">
    <span class="line anim-el" id="el-line1">ふたりの「今」を、</span>
    <span class="line anim-el" id="el-line2">映画のように残す。</span>
  </h2>
  <p class="desc">
    <span class="line anim-el" id="el-desc1">世界中のロケーションで、おふたりだけの物語を</span>
    <span class="line anim-el" id="el-desc2">シネマティックに残します。</span>
  </p>
  <a class="cta anim-el" id="el-cta" href="#">View More</a>
</div>

<div class="desc-block"><h3 id="descTitle"></h3><p id="descText"></p></div>
<div class="footer">ukigumo — about animation preview</div>

<script>
const els = [
  document.getElementById('el-label'),
  document.getElementById('el-line1'),
  document.getElementById('el-line2'),
  document.getElementById('el-desc1'),
  document.getElementById('el-desc2'),
  document.getElementById('el-cta'),
];

const patterns = [
  {
    title: '#01 — 1行ずつフェードイン（下から）',
    desc: 'bird-and-insect風。各行が下からスッと上がりながら順番にフェードイン。',
    delay: [0, 200, 400, 700, 900, 1200],
    style: (el) => { el.style.transform='translateY(30px)'; el.style.filter=''; },
    show: (el) => { el.style.transition='opacity 0.8s ease, transform 1s cubic-bezier(0.19,1,0.22,1)'; el.style.opacity='1'; el.style.transform='translateY(0)'; },
  },
  {
    title: '#02 — 1行ずつフェードイン（ブラーから）',
    desc: 'テキストがボケた状態から鮮明になりながら現れる。ドリーミー。',
    delay: [0, 250, 500, 800, 1050, 1400],
    style: (el) => { el.style.transform=''; el.style.filter='blur(8px)'; },
    show: (el) => { el.style.transition='opacity 1s ease, filter 1.2s ease'; el.style.opacity='1'; el.style.filter='blur(0)'; },
  },
  {
    title: '#03 — 1行ずつ左からスライド',
    desc: '各行が左から右へスライドしながらフェードイン。動きが横方向で新鮮。',
    delay: [0, 200, 400, 700, 900, 1200],
    style: (el) => { el.style.transform='translateX(-40px)'; el.style.filter=''; },
    show: (el) => { el.style.transition='opacity 0.7s ease, transform 0.9s cubic-bezier(0.19,1,0.22,1)'; el.style.opacity='1'; el.style.transform='translateX(0)'; },
  },
  {
    title: '#04 — 全体がじわーっと（一括フェード）',
    desc: '全要素が同時にゆっくりフェードイン。シンプルで上品。',
    delay: [0, 0, 0, 0, 0, 0],
    style: (el) => { el.style.transform=''; el.style.filter='blur(3px)'; },
    show: (el) => { el.style.transition='opacity 2s cubic-bezier(0.19,1,0.22,1), filter 1.5s ease'; el.style.opacity='1'; el.style.filter='blur(0)'; },
  },
  {
    title: '#05 — タイプライター風（早いテンポ）',
    desc: '短い間隔でパパパっと1行ずつ現れる。リズミカル。',
    delay: [0, 120, 240, 420, 540, 720],
    style: (el) => { el.style.transform='translateY(15px)'; el.style.filter=''; },
    show: (el) => { el.style.transition='opacity 0.5s ease, transform 0.6s cubic-bezier(0.19,1,0.22,1)'; el.style.opacity='1'; el.style.transform='translateY(0)'; },
  },
  {
    title: '#06 — スケールイン',
    desc: '各行が少し小さい状態から等倍に戻りながら現れる。',
    delay: [0, 200, 400, 700, 900, 1200],
    style: (el) => { el.style.transform='scale(0.9)'; el.style.filter=''; },
    show: (el) => { el.style.transition='opacity 0.8s ease, transform 1s cubic-bezier(0.19,1,0.22,1)'; el.style.opacity='1'; el.style.transform='scale(1)'; },
  },
  {
    title: '#07 — 下から＋ブラー（bird-and-insect忠実再現）',
    desc: '下からの移動＋ブラー解除を組合せ。スクリーンショットの動きに最も近い。',
    delay: [0, 250, 500, 850, 1100, 1500],
    style: (el) => { el.style.transform='translateY(35px)'; el.style.filter='blur(5px)'; },
    show: (el) => { el.style.transition='opacity 1s cubic-bezier(0.19,1,0.22,1), transform 1.2s cubic-bezier(0.19,1,0.22,1), filter 0.8s ease'; el.style.opacity='1'; el.style.transform='translateY(0)'; el.style.filter='blur(0)'; },
  },
  {
    title: '#08 — マスク・ワイプ（下から露出）',
    desc: '各行がクリップマスクで下から上に切り取られるように登場。',
    delay: [0, 250, 500, 800, 1050, 1400],
    style: (el) => { el.style.transform=''; el.style.filter=''; el.style.clipPath='inset(100% 0 0 0)'; },
    show: (el) => { el.style.transition='opacity 0.6s ease, clip-path 0.8s cubic-bezier(0.19,1,0.22,1)'; el.style.opacity='1'; el.style.clipPath='inset(0 0 0 0)'; },
  },
  {
    title: '#09 — ゆったりスタガー（超スロー）',
    desc: '各行がたっぷり間を取って順番に浮かぶ。瞑想的で贅沢な間。',
    delay: [0, 400, 800, 1400, 1800, 2400],
    style: (el) => { el.style.transform='translateY(20px)'; el.style.filter='blur(4px)'; },
    show: (el) => { el.style.transition='opacity 1.5s cubic-bezier(0.19,1,0.22,1), transform 1.8s cubic-bezier(0.19,1,0.22,1), filter 1.2s ease'; el.style.opacity='1'; el.style.transform='translateY(0)'; el.style.filter='blur(0)'; },
  },
  {
    title: '#10 — 2段階（見出し先→説明後）',
    desc: '見出しが先にふわっと出て、少し間を置いてから説明文とボタンが登場。',
    delay: [0, 150, 300, 900, 1050, 1400],
    style: (el) => { el.style.transform='translateY(25px)'; el.style.filter='blur(3px)'; },
    show: (el) => { el.style.transition='opacity 1s cubic-bezier(0.19,1,0.22,1), transform 1.2s cubic-bezier(0.19,1,0.22,1), filter 0.8s ease'; el.style.opacity='1'; el.style.transform='translateY(0)'; el.style.filter='blur(0)'; },
  },
];

// Build tabs
const tabsEl = document.getElementById('tabs');
patterns.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' active' : '');
  btn.textContent = '#' + String(i+1).padStart(2,'0');
  btn.onclick = () => selectPattern(i);
  tabsEl.appendChild(btn);
});

let currentPattern = 0;
let animTimer = null;

function resetAll() {
  els.forEach(el => {
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = '';
    el.style.filter = '';
    el.style.clipPath = '';
  });
}

function playPattern(p) {
  // Reset
  resetAll();
  // Apply initial hidden styles
  requestAnimationFrame(() => {
    els.forEach(el => p.style(el));
    // Trigger show with delays
    requestAnimationFrame(() => {
      els.forEach((el, i) => {
        setTimeout(() => p.show(el), p.delay[i]);
      });
    });
  });
}

function selectPattern(idx) {
  currentPattern = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('descTitle').textContent = patterns[idx].title;
  document.getElementById('descText').textContent = patterns[idx].desc;
  clearInterval(animTimer);
  playPattern(patterns[idx]);
  // Replay every 5 seconds
  animTimer = setInterval(() => playPattern(patterns[currentPattern]), 5000);
}

selectPattern(0);
</script>
</body>
</html>
