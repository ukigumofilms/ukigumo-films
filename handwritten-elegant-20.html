<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Handwritten — 20 Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500&family=Marck+Script&family=Euphoria+Script&family=Petit+Formal+Script&family=Rouge+Script&family=Niconne&family=Mr+De+Haviland&family=League+Script&family=Meie+Script&family=La+Belle+Aurore&family=Satisfy&family=Cookie&family=Yellowtail&family=Clicker+Script&family=Berkshire+Swash&family=Leckerli+One&family=Norican&family=Courgette&family=Yesteryear&family=Merienda:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0e0e0e; color:#fff; }
  .header { text-align:center; padding:1.5rem 1rem 0.5rem; }
  .header h1 { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:300; letter-spacing:0.15em; }
  .header p { font-size:0.55rem; opacity:0.3; margin-top:0.2rem; font-family:'Cormorant Garamond',serif; }

  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%,500px),1fr));
    gap:1rem;
    padding:0.8rem 1rem 3rem;
    max-width:1100px;
    margin:0 auto;
  }
  .card {
    position:relative; overflow:hidden;
    aspect-ratio:16/9; border-radius:2px;
    transition:transform 0.3s;
  }
  .card:hover { transform:scale(1.01); }
  .card__bg { position:absolute; top:0; left:0; width:100%; height:100%; }
  .card__bg img { width:100%; height:100%; object-fit:cover; }
  .card__overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.72); }
  .card__num { position:absolute; top:0.5rem; left:0.6rem; font-family:'Cormorant Garamond',serif; font-size:0.5rem; letter-spacing:0.1em; opacity:0.3; }
  .card__info { position:absolute; bottom:0.35rem; right:0.6rem; font-size:0.42rem; opacity:0.22; font-family:'Cormorant Garamond',serif; }
  .card__tag { position:absolute; top:0.5rem; right:0.6rem; font-size:0.38rem; opacity:0.25; font-family:'Cormorant Garamond',serif; letter-spacing:0.05em; background:rgba(255,255,255,0.08); padding:0.15rem 0.4rem; border-radius:1px; }
  .card__text {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; padding:1.2rem 1.5rem; text-align:center;
  }
  .card__main { line-height:1.8; color:rgba(255,255,255,0.6); }
  .card__sub  { line-height:1.8; color:rgba(255,255,255,0.35); margin-top:clamp(1rem,3vw,1.8rem); }

  @media(max-width:480px){
    .grid{grid-template-columns:1fr;padding:0.5rem;gap:0.8rem;}
    .card{aspect-ratio:9/14;}
  }
  .footer { text-align:center; padding:1.5rem; font-size:0.45rem; opacity:0.15; font-family:'Cormorant Garamond',serif; }
</style>
</head>
<body>
<div class="header">
  <h1>Elegant Handwritten — 20 Patterns</h1>
  <p>高級感のある手書き風 20フォント比較</p>
</div>
<div class="grid" id="grid"></div>
<div class="footer">ukigumo — elegant handwritten font preview</div>
<script>
const m=['Weaving each moment into the future','one frame, one second at a time'];
const s=['A brand delivering works that become','a gentle staff for your life'];
const imgs=['images/london/05.jpg','images/paris/03.jpg','images/firenze/04.jpg','images/malta/04.jpg','images/london/03.jpg','images/firenze/06.jpg'];

const F=[
  {n:'Dancing Script',       ms:'clamp(1.2rem,3vw,1.7rem)',    ss:'clamp(0.95rem,2.4vw,1.3rem)', ls:'0.03em', w:500, l:'Dancing Script Medium', tag:'上品ナチュラル'},
  {n:'Marck Script',         ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'エレガント手書き'},
  {n:'Euphoria Script',      ms:'clamp(1.2rem,3vw,1.7rem)',    ss:'clamp(0.95rem,2.4vw,1.3rem)', ls:'0.02em', tag:'繊細×上品'},
  {n:'Petit Formal Script',  ms:'clamp(1rem,2.5vw,1.4rem)',    ss:'clamp(0.85rem,2vw,1.1rem)',   ls:'0.03em', tag:'フォーマル手書き'},
  {n:'Rouge Script',         ms:'clamp(1.4rem,3.5vw,2rem)',    ss:'clamp(1.1rem,2.8vw,1.5rem)',  ls:'0.02em', tag:'パリジェンヌ'},
  {n:'Niconne',              ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'品のある柔らかさ'},
  {n:'Mr De Haviland',       ms:'clamp(1.4rem,3.5vw,2rem)',    ss:'clamp(1.1rem,2.8vw,1.5rem)',  ls:'0.02em', tag:'サイン風高級'},
  {n:'League Script',        ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'クラシック手書き'},
  {n:'Meie Script',          ms:'clamp(1.2rem,3vw,1.6rem)',    ss:'clamp(0.95rem,2.4vw,1.25rem)',ls:'0.02em', tag:'万年筆×上品'},
  {n:'La Belle Aurore',      ms:'clamp(1.1rem,2.8vw,1.5rem)',  ss:'clamp(0.9rem,2.2vw,1.2rem)',  ls:'0.02em', tag:'フレンチ手紙'},
  {n:'Satisfy',              ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'レトロ高級'},
  {n:'Cookie',               ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'柔らかエレガント'},
  {n:'Yellowtail',           ms:'clamp(1.2rem,3vw,1.6rem)',    ss:'clamp(0.95rem,2.4vw,1.25rem)',ls:'0.02em', tag:'ヴィンテージ'},
  {n:'Clicker Script',       ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'きれいめ手書き'},
  {n:'Berkshire Swash',      ms:'clamp(1.1rem,2.8vw,1.5rem)',  ss:'clamp(0.9rem,2.2vw,1.2rem)',  ls:'0.03em', tag:'クラシカル'},
  {n:'Leckerli One',         ms:'clamp(1.1rem,2.8vw,1.5rem)',  ss:'clamp(0.9rem,2.2vw,1.2rem)',  ls:'0.02em', tag:'ブラッシュ高級'},
  {n:'Norican',              ms:'clamp(1.2rem,3vw,1.6rem)',    ss:'clamp(0.95rem,2.4vw,1.25rem)',ls:'0.02em', tag:'モダン手書き'},
  {n:'Courgette',            ms:'clamp(1.1rem,2.8vw,1.5rem)',  ss:'clamp(0.9rem,2.2vw,1.2rem)',  ls:'0.02em', tag:'洗練カジュアル'},
  {n:'Yesteryear',           ms:'clamp(1.3rem,3.2vw,1.8rem)',  ss:'clamp(1rem,2.5vw,1.35rem)',   ls:'0.02em', tag:'ノスタルジック'},
  {n:'Merienda',             ms:'clamp(1.1rem,2.8vw,1.5rem)',  ss:'clamp(0.9rem,2.2vw,1.2rem)',  ls:'0.02em', w:300, l:'Merienda Light', tag:'上質カジュアル'},
];

const g=document.getElementById('grid');
F.forEach((f,i)=>{
  const img=imgs[i%imgs.length];
  const fw=f.w||400;
  const lb=f.l||f.n;
  const c=document.createElement('div');
  c.className='card';
  c.innerHTML=`
    <div class="card__bg"><img src="${img}" alt=""><div class="card__overlay"></div></div>
    <div class="card__num">#${String(i+1).padStart(2,'0')}</div>
    <div class="card__tag">${f.tag}</div>
    <div class="card__info">${lb}</div>
    <div class="card__text">
      <p class="card__main" style="font-family:'${f.n}',cursive;font-size:${f.ms};font-weight:${fw};letter-spacing:${f.ls};">${m.join('<br>')}</p>
      <p class="card__sub" style="font-family:'${f.n}',cursive;font-size:${f.ss};font-weight:${fw};letter-spacing:${f.ls};">${s.join('<br>')}</p>
    </div>`;
  g.appendChild(c);
});
</script>
</body>
</html>
