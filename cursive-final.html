<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursive Sub — 10 Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Herr+Von+Muellerhoff&family=Mrs+Saint+Delafield&family=Carattere&family=Lavishly+Yours&family=Qwigley&family=Ruthie&family=Lovers+Quarrel&family=Pinyon+Script&family=Corinthia&family=Noto+Sans+JP:wght@100&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0e0e0e; color:#fff; font-family:'Noto Sans JP',sans-serif; }

  .header { text-align:center; padding:1.5rem 1rem 0.5rem; }
  .header h1 { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:300; letter-spacing:0.15em; }
  .header p { font-size:0.55rem; opacity:0.3; margin-top:0.2rem; }

  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
    gap:1.2rem;
    padding:1rem 1rem 3rem;
    max-width:1200px;
    margin:0 auto;
  }

  .card {
    position:relative; overflow:hidden;
    aspect-ratio: 16/9; border-radius:2px;
    transition: transform 0.3s;
  }
  .card:hover { transform:scale(1.01); }
  .card__bg { position:absolute; top:0; left:0; width:100%; height:100%; }
  .card__bg img { width:100%; height:100%; object-fit:cover; }
  .card__overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.72);
  }
  .card__num {
    position:absolute; top:0.5rem; left:0.6rem;
    font-family:'Cormorant Garamond',serif;
    font-size:0.5rem; letter-spacing:0.1em; opacity:0.3;
  }
  .card__info {
    position:absolute; bottom:0.35rem; right:0.6rem;
    font-size:0.4rem; opacity:0.2;
    font-family:'Cormorant Garamond',serif;
  }
  .card__text {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; padding:1.2rem 1.5rem; text-align:center;
  }

  /* 日本語 (Noto Sans JP w100 = パターン#01) */
  .jp1 {
    font-family:'Noto Sans JP',sans-serif;
    font-weight:100;
    font-size:clamp(0.85rem,2.2vw,1.1rem);
    letter-spacing:0.12em;
    line-height:2.6;
    color:rgba(255,255,255,0.9);
  }
  .jp2 {
    font-family:'Noto Sans JP',sans-serif;
    font-weight:100;
    font-size:clamp(0.72rem,1.7vw,0.88rem);
    letter-spacing:0.12em;
    line-height:2.6;
    color:rgba(255,255,255,0.5);
    margin-top:0.5rem;
  }

  @media (max-width:480px) {
    .grid { grid-template-columns:1fr; }
    .card { aspect-ratio:9/14; }
  }

  .footer { text-align:center; padding:1.5rem; font-size:0.45rem; opacity:0.15; }
</style>
</head>
<body>

<div class="header">
  <h1>Cursive English Sub — 10 Patterns</h1>
  <p>Noto Sans JP w100 ＋ サイン風筆記体 × 10フォント</p>
</div>

<div class="grid" id="grid"></div>
<div class="footer">ukigumo — cursive sub preview</div>

<script>
const jpL1 = 'この瞬間を、未来へと紡ぐ一枚、一秒に';
const jpL2 = 'あなたの人生を支える杖のような作品を届けるブランドです';

// 英語訳（3行）
const enLines = [
  'Weaving each moment into the future',
  'one frame, one second at a time',
  'A brand delivering works that become a gentle staff for your life',
];

const imgs = [
  'images/london/05.jpg','images/paris/03.jpg','images/firenze/04.jpg',
  'images/malta/04.jpg','images/london/03.jpg','images/firenze/06.jpg',
  'images/firenze/07.jpg','images/london/07.jpg','images/paris/01.jpg',
  'images/malta/03.jpg',
];

const fonts = [
  { name:'Monsieur La Doulaise',  sz:'0.55rem', lh:'1.8', ls:'0.02em', op:'0.16' },
  { name:'Herr Von Muellerhoff',  sz:'0.6rem',  lh:'1.7', ls:'0.02em', op:'0.15' },
  { name:'Mrs Saint Delafield',   sz:'0.55rem', lh:'1.8', ls:'0.03em', op:'0.16' },
  { name:'Carattere',             sz:'0.58rem', lh:'1.7', ls:'0.02em', op:'0.15' },
  { name:'Lavishly Yours',        sz:'0.52rem', lh:'1.8', ls:'0.03em', op:'0.14' },
  { name:'Qwigley',               sz:'0.65rem', lh:'1.6', ls:'0.02em', op:'0.15' },
  { name:'Ruthie',                sz:'0.55rem', lh:'1.8', ls:'0.02em', op:'0.16' },
  { name:'Lovers Quarrel',        sz:'0.6rem',  lh:'1.7', ls:'0.02em', op:'0.15' },
  { name:'Pinyon Script',         sz:'0.5rem',  lh:'1.8', ls:'0.03em', op:'0.16' },
  { name:'Corinthia',             sz:'0.6rem',  lh:'1.7', ls:'0.02em', op:'0.14' },
];

const grid = document.getElementById('grid');

fonts.forEach((f, i) => {
  const img = imgs[i % imgs.length];
  const enHtml = enLines.map(l => `<span>${l}</span>`).join('<br>');

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card__bg"><img src="${img}" alt=""><div class="card__overlay"></div></div>
    <div class="card__num">#${String(i+1).padStart(2,'0')}</div>
    <div class="card__info">${f.name}</div>
    <div class="card__text">
      <p class="jp1">${jpL1}</p>
      <p class="jp2">${jpL2}</p>
      <p style="font-family:'${f.name}',cursive; font-size:${f.sz}; line-height:${f.lh}; letter-spacing:${f.ls}; color:rgba(255,255,255,${f.op}); margin-top:1.3rem; font-weight:400;">
        ${enHtml}
      </p>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
