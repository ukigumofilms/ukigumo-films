<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Cormorant Garamond',serif;}
.header{text-align:center;padding:1.5rem 1rem 0.5rem;}
.header h1{font-size:1rem;font-weight:300;letter-spacing:0.15em;}
.header p{font-size:0.5rem;opacity:0.25;margin-top:0.2rem;}

.patterns{max-width:1000px;margin:0 auto;padding:0 1rem 3rem;}

.pattern{
  position:relative;overflow:hidden;
  margin-bottom:1.2rem;border-radius:2px;
}
.pattern__bg{position:absolute;top:0;left:0;width:100%;height:100%;}
.pattern__bg img{width:100%;height:100%;object-fit:cover;}
.pattern__overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);}
.pattern__num{
  position:absolute;top:0.5rem;left:0.6rem;
  font-size:0.5rem;letter-spacing:0.1em;opacity:0.25;z-index:5;
}
.pattern__info{
  position:absolute;bottom:0.4rem;right:0.6rem;
  font-size:0.4rem;opacity:0.18;z-index:5;
}

.marquee-track{
  position:relative;z-index:2;
  display:flex;align-items:baseline;
  width:max-content;
  gap:var(--mg,3rem);
  white-space:nowrap;
}
.marquee-track .marquee-item{
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;
}
.marquee-track .marquee-name{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-style:italic;
  color:rgba(255,255,255,var(--op,0.06));
  letter-spacing:var(--ls,0.05em);
  line-height:1.1;
}
.marquee-track .marquee-coords{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-style:normal;
  color:rgba(255,255,255,calc(var(--op,0.06) * 0.7));
  letter-spacing:0.05em;
  margin-top:0.15em;
  white-space:nowrap;
}

@keyframes scrollLeft{
  0%{transform:translateX(5%);}
  100%{transform:translateX(-50%);}
}

.footer{text-align:center;padding:1.5rem;font-size:0.42rem;opacity:0.12;}
</style>
</head>

const imgs = ['images/london/05.jpg'];
const container = document.getElementById('patterns');

patterns.forEach((p, pi) => {
  const div = document.createElement('div');
  div.className = 'pattern';
  div.style.height = p.height;

  // Build items (duplicate for seamless loop)
  const allSizes = [...p.sizes, ...p.sizes];
  const spans = allSizes.map(s => {
    const coordSize = `calc(${s.s} * 0.18)`;
    return `<div class="marquee-item">
      <span class="marquee-name" style="font-size:${s.s};">${s.w}</span>
      <span class="marquee-coords" style="font-size:${coordSize};">${coords[s.w]}</span>
    </div>`;
  }).join('');

  div.innerHTML = `
    <div class="pattern__bg">
      <img src="${imgs[0]}" alt="">
      <div class="pattern__overlay"></div>
    </div>
    <div class="pattern__num">#${String(pi+1).padStart(2,'0')}</div>
    <div class="pattern__info">${p.label}</div>
    <div class="marquee-track" style="--mg:${p.gap};--op:${p.op};--ls:${p.ls};animation:scrollLeft ${p.speed}s linear infinite;align-items:center;">
      ${spans}
    </div>
  `;

  // vertical centering for track
  div.style.display = 'flex';
  div.style.alignItems = 'center';

  container.appendChild(div);

  document.querySelectorAll('.pattern').forEach((p,i) => {
